# Lefthook configuration
# See https://github.com/evilmartians/lefthook for documentation

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: pnpm exec biome check --files-ignore-unknown=true --no-errors-on-unmatched --write {staged_files}
      stage_fixed: true

    spellcheck:
      run: pnpm run spellcheck-changed -- {staged_files}

    python-lint:
      root: "tools"
      glob: "tools/**/*.py"
      run: uv run --quiet ruff check {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm run typecheck
      timeout: 1m
