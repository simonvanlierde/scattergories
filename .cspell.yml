---
version: "0.2"
language: en
dictionaries:
  - cpp-compound-words
  - docker
  - filetypes
  - npm
  - python-common
  - software-tools
  - softwareTerms

import:
  - "@cspell/dict-de-de/cspell-ext.json"
  - "@cspell/dict-es-es/cspell-ext.json"
  - "@cspell/dict-fr-fr/cspell-ext.json"
  - "@cspell/dict-it-it/cspell-ext.json"
  - "@cspell/dict-nl-nl/cspell-ext.json"
  - "@cspell/dict-pl_pl/cspell-ext.json"
  - "@cspell/dict-pt-br/cspell-ext.json"
  - "@cspell/dict-el/cspell-ext.json"

# Include hidden files
enableGlobDot: true

# Exclude files in .gitignore
useGitignore: true
ignorePaths:
  - ".git"
  - "*-lock.*"
  - ".vscode/**"
  # SVG markup is a sea of attribute names, not prose.
  - "**/*.svg"

# Check locale and translation files in their respective languages.
overrides:
  - filename: "**/{de,*.de}.json"
    language: en,de
  - filename: "**/{es,*.es}.json"
    language: en,es
  - filename: "**/{fr,*.fr}.json"
    language: en,fr
  - filename: "**/{it,*.it}.json"
    language: en,it
  - filename: "**/{nl,*.nl}.json"
    language: en,nl
  - filename: "**/{pl,*.pl}.json"
    language: en,pl
  - filename: "**/{pt,*.pt}.json"
    language: en,pt
  - filename: "**/{el,*.el}.json"
    language: en,el

