---
version: "0.2"
language: en
dictionaries:
  - cpp-compound-words
  - docker
  - filetypes
  - npm
  - python-common
  - software-tools
  - softwareTerms

# Include hidden files
enableGlobDot: true

# Exclude files in .gitignore
useGitignore: true
ignorePaths:
  - ".git"
  - "*-lock.*"
  - ".vscode/**"
  # Translated UI strings are intentionally non-English.
  - "src/i18n/locales/**"
  # SVG markup is a sea of attribute names, not prose.
  - "**/*.svg"
  # Generated data files (frequencies etc.)
  - "tools/letter_frequency/data/**"
  - "tools/letter-frequency/data/**"

words:
  - Lierde
  - Scattergories
  - scattegories
  - Wikitext
  # Fonts
  - Avenir
  # Biome rule name
  - Filenaming
  # HTTP / infra terms
  - CICD
  - geolocation
  - htmlcov
  - nosniff
  - tmpfs
  - Unmute
  - zstd
  # Native language names shown in UI language picker
  - Deutsch
  - Español
  - Français
  - Italiano
  # Product-specific coinages
  - Childrens
  - Footware
  # Tools ecosystem
  - addopts
  - argostranslate
  - huggingface
  - testpaths
  - toupper
  # Spanish sample categories in test fixtures
  - Animales
  - Comidas
