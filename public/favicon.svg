<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img">
  <title>Scattergories</title>
  <rect width="24" height="24" rx="4" fill="oklch(34% 0.11 260)" />
  <g transform="translate(1.68 1.68) scale(0.86)">
  <!-- top face — paper cream -->
  <path d="M12 2 21 7 12 12 3 7Z" fill="oklch(98.5% 0.008 85)" />
  <!-- left face — one step down the paper ramp -->
  <path d="M3 7 12 12 12 22 3 17Z" fill="oklch(88% 0.014 85)" />
  <!-- right face — two steps down; keeps the cube readable as a solid -->
  <path d="M21 7 12 12 12 22 21 17Z" fill="oklch(76% 0.018 85)" />
  <!-- S drawn upright, then flattened onto the top face's plane (the matrix is
       the isometric projection: full width, 55% height, origin at face centre) -->
  <g transform="matrix(0.55 0 0 0.32 12 7)">
    <path
      d="M4.6 -5.4C2.4 -7.4 -4.8 -7.4 -4.8 -3.2C-4.8 0.6 4.8 0.4 4.8 4.2C4.8 8.4 -2.4 8.4 -4.8 6.2"
      fill="none"
      stroke="oklch(34% 0.11 260)"
      stroke-width="2.7"
      stroke-linecap="round"
    />
  </g>
  </g>
</svg>
