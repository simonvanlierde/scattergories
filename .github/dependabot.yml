version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      production-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
    cooldown:
      default-days: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 3

  - package-ecosystem: uv
    directory: /tools
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 3
