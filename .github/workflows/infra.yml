name: Infra Validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'Caddyfile'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'justfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/ci/**'
      - '.github/workflows/infra.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
      - '.github/workflows/security.yml'
      - '.github/workflows/tools.yml'
  push:
    branches: [main]
    paths:
      - 'Caddyfile'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'justfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/ci/**'
      - '.github/workflows/infra.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'
      - '.github/workflows/security.yml'
      - '.github/workflows/tools.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  infra:
    name: Validate deployment infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Infrastructure checks
        run: pnpm run infra:check
