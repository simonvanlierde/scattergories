name: Tools Validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/**/*.py'
      - 'tools/pyproject.toml'
      - 'tools/uv.lock'
      - 'tools/justfile'
      - '.github/workflows/tools.yml'
  push:
    branches: [main]
    paths:
      - 'tools/**/*.py'
      - 'tools/pyproject.toml'
      - 'tools/uv.lock'
      - 'tools/justfile'
      - '.github/workflows/tools.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tools

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.14'
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check

      - name: Typecheck
        run: uv run ty check

      - name: Test
        run: uv run pytest

  integration:
    name: Optional integration smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tools

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.14'
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Install dependencies with translation extras
        run: uv sync --group translation --locked

      - name: Doctor
        run: uv run sg-tools doctor || true

      - name: Wikitext smoke test
        run: uv run sg-tools weights sample --dataset wikitext-2

      - name: Argos translation smoke test
        run: uv run --group translation sg-tools translate categories --target-locales es
