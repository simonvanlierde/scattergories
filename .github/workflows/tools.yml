name: Tools CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/**/*.py'
      - 'tools/pyproject.toml'
      - 'tools/uv.lock'
      - '.github/workflows/tools.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tools

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.14'
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Install dependencies
        run: uv sync --group translation --locked

      - name: Lint
        run: uv run ruff check

      - name: Typecheck
        run: uv run --group translation ty check

      - name: Test
        run: uv run pytest
