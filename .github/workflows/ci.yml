name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'biome.json'
      - 'cspell.yml'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'public/**'
      - 'src/**'
      - 'tests/**'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Validate app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
