name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '24 4 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-app
      - run: pnpm run typecheck
      - run: pnpm run spellcheck
      - run: pnpm run lint
      - run: pnpm run test:coverage
      - run: pnpm run build
      - run: pnpm run budget

      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage/lcov.info
          flags: frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: app
    # Smoke (Chromium) on every push/PR; the full browser matrix on schedule or manual dispatch.
    env:
      FULL: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-app
      - run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps ${{ env.FULL == 'true' && '' || 'chromium' }}

      - name: Run E2E tests
        run: ${{ env.FULL == 'true' && 'pnpm run test:e2e' || 'pnpm run test:e2e:smoke' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

  tools:
    name: Tools
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - run: uv sync --locked # Python version is read from tools/.python-version.
      - run: uv run ruff check
      - run: uv run ty check
      - run: uv run pytest --cov-report=xml

      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: tools/coverage.xml
          flags: tools
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
