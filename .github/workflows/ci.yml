name: Validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'biome.json'
      - 'cspell.yml'
      - 'index.html'
      - 'justfile'
      - 'lefthook.yml'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'public/**'
      - 'scripts/ci/**'
      - 'src/**'
      - 'tests/**'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'biome.json'
      - 'cspell.yml'
      - 'index.html'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'public/**'
      - 'scripts/ci/**'
      - 'src/**'
      - 'tests/**'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Verify app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck

      - name: Spellcheck changed files
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")

          if [ "${#changed_files[@]}" -gt 0 ]; then
            pnpm run spellcheck-changed -- "${changed_files[@]}"
          fi

      - name: Spellcheck full repo
        if: github.event_name != 'pull_request'
        run: pnpm run spellcheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      - name: Production build
        run: pnpm run build

      - name: Bundle budgets
        run: pnpm run budget
