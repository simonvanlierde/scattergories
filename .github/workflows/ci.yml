name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '24 4 1 * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-app
      - run: pnpm run typecheck
      - run: pnpm run spellcheck
      - run: pnpm run lint
      - run: pnpm run test:coverage
      - run: pnpm run build
      - run: pnpm run budget

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          flags: frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: app
    # Browsers + system deps are baked into the image; keep the tag in sync with @playwright/test.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    # Every Chromium test on each push/PR; the full browser matrix monthly or on manual dispatch.
    env:
      FULL: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-app
      - run: pnpm run build

      - name: Run E2E tests
        run: ${{ env.FULL == 'true' && 'pnpm run test:e2e' || 'pnpm run test:e2e:chromium' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

  tools:
    name: Tools
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - run: uv sync --locked # Python version is read from tools/.python-version.
      - run: uv run ruff check
      - run: uv run ty check
      - run: uv run pytest --cov-report=xml

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: tools/coverage.xml
          flags: tools
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
