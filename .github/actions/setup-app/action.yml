name: Setup app
description: Install pnpm and Node, then install dependencies with a cached store.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6; pnpm version from package.json `packageManager`.

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .node-version # Single source of truth, also read by mise.
        cache: pnpm

    - shell: bash
      run: pnpm install --frozen-lockfile
