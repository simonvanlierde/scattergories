services:
  web:
    build: .
    image: scattergories:local
    container_name: scattergories-helper
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /config
      - /data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  tunnel:
    image: cloudflare/cloudflared:2026.3.0
    container_name: scattergories-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - tunnel
